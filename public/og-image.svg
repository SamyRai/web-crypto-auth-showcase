<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background matching app theme -->
    <radialGradient id="bgGradient" cx="100%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="50%" stop-color="#16213e" />
      <stop offset="100%" stop-color="#0f3460" />
    </radialGradient>
    
    <!-- Text gradient matching text-transparent bg-clip-text dark:from-white dark:to-stone-400 -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a8a29e" />
    </linearGradient>

    <!-- Icon gradient matching from-blue-500 to-purple-600 -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>

    <filter id="blurFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)" />

  <!-- Background decorative glow matching app header - Made larger -->
  <circle cx="600" cy="220" r="250" fill="url(#iconGradient)" opacity="0.25" filter="url(#blurFilter)" />

  <!-- App Icon / Lock - Scaled up for better space utilization -->
  <g transform="translate(600, 240)">
    <!-- Lock Body -->
    <rect x="-60" y="-45" width="120" height="90" rx="16" fill="none" stroke="url(#iconGradient)" stroke-width="12" />
    <!-- Lock Shackle -->
    <path d="M-30,-45 v-30 a30,30 0 0,1 60,0 v30" fill="none" stroke="url(#iconGradient)" stroke-width="12" stroke-linecap="round" />
    <!-- Keyhole -->
    <circle cx="0" cy="0" r="12" fill="url(#iconGradient)" />
    <path d="M-6, 0 l6,27 l6,-27 Z" fill="url(#iconGradient)" />
  </g>

  <!-- Title - Made significantly larger -->
  <text x="600" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="700" fill="url(#textGradient)" text-anchor="middle" letter-spacing="-2">
    WebAuthn &amp; Web Crypto
  </text>
  
  <!-- Subtitle - Scaled up and given more breathing room -->
  <text x="600" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="400" fill="#94a3b8" text-anchor="middle" letter-spacing="-0.5">
    Passkeys, Encryption, and Secure Context
  </text>
</svg>
